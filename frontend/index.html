<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SysPulse — Server Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-grid" aria-hidden="true"></div>
    <div class="scan-line" aria-hidden="true"></div>

    <!-- ── Top Bar ── -->
    <header class="topbar">
        <div class="topbar__left">
            <span class="topbar__logo">SYS<span class="accent">PULSE</span></span>
            <span class="topbar__divider">|</span>
            <span class="topbar__hostname" id="hostname">localhost</span>
        </div>
        <div class="topbar__right">
            <span class="status-pill" id="connectionStatus">
                <span class="status-pill__dot"></span>
                <span class="status-pill__text">Connecting…</span>
            </span>
            <span class="topbar__updated">Last updated: <span id="lastUpdated">—</span></span>
            <button class="refresh-btn" id="refreshBtn" title="Refresh now">↺</button>
        </div>
    </header>

    <!-- ── Dashboard ── -->
    <main class="dashboard">

        <!-- Row 1 · Core metrics -->
        <section class="grid-row row--primary">

            <div class="card">
                <div class="card__header">
                    <span class="card__label">CPU</span>
                    <svg class="card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="4" y="4" width="16" height="16" rx="2"/>
                        <path d="M9 9h6v6H9z"/>
                        <path d="M9 1v3M15 1v3M9 20v3M15 20v3M1 9h3M1 15h3M20 9h3M20 15h3"/>
                    </svg>
                </div>
                <div class="card__value" id="cpuValue">—</div>
                <div class="card__bar-wrap"><div class="card__bar" id="cpuBar"></div></div>
                <div class="card__sub">processor load</div>
            </div>

            <div class="card">
                <div class="card__header">
                    <span class="card__label">MEMORY</span>
                    <svg class="card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="2" y="8" width="20" height="8" rx="1"/>
                        <path d="M6 8V6M10 8V6M14 8V6M18 8V6M6 16v2M10 16v2M14 16v2M18 16v2"/>
                    </svg>
                </div>
                <div class="card__value" id="memoryValue">—</div>
                <div class="card__bar-wrap"><div class="card__bar" id="memoryBar"></div></div>
                <div class="card__sub">RAM usage</div>
            </div>

            <div class="card">
                <div class="card__header">
                    <span class="card__label">SWAP</span>
                    <svg class="card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
                    </svg>
                </div>
                <div class="card__value" id="swapValue">—</div>
                <div class="card__bar-wrap"><div class="card__bar" id="swapBar"></div></div>
                <div class="card__sub">swap usage</div>
            </div>

            <div class="card">
                <div class="card__header">
                    <span class="card__label">DISK</span>
                    <svg class="card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <ellipse cx="12" cy="5" rx="9" ry="3"/>
                        <path d="M3 5v14a9 3 0 0018 0V5"/>
                        <circle cx="12" cy="19" r="1" fill="currentColor"/>
                    </svg>
                </div>
                <div class="card__value" id="diskValue">—</div>
                <div class="card__bar-wrap"><div class="card__bar" id="diskBar"></div></div>
                <div class="card__sub">/ partition</div>
            </div>

        </section>

        <!-- Row 2 · Network · Uptime · Battery -->
        <section class="grid-row row--secondary">

            <div class="card card--network">
                <div class="card__header">
                    <span class="card__label">NETWORK</span>
                    <svg class="card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M1.5 8.5C6.5 3.5 17.5 3.5 22.5 8.5M5 12c3.5-3 11-3 14 0M9 15.5c1.5-1.5 5.5-1.5 6 0M12 19h.01"/>
                    </svg>
                </div>
                <div class="card__value card__value--network" id="networkValue">—</div>
                <div class="card__sub" id="networkNote">waiting for data…</div>
            </div>

            <div class="card">
                <div class="card__header">
                    <span class="card__label">UPTIME</span>
                    <svg class="card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="9"/>
                        <path d="M12 7v5l3 3"/>
                    </svg>
                </div>
                <div class="card__value card__value--uptime" id="uptimeValue">—</div>
                <div class="card__sub">since last boot</div>
            </div>

            <div class="card">
                <div class="card__header">
                    <span class="card__label">BATTERY</span>
                    <svg class="card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="2" y="7" width="18" height="11" rx="2"/>
                        <path d="M20 11h2v3h-2"/>
                    </svg>
                </div>
                <div class="card__value card__value--battery" id="batteryValue">—</div>
                <div class="card__sub" id="batteryNote">waiting for data…</div>
            </div>

        </section>

        <!-- Row 3 · Overall status -->
        <section class="status-banner">
            <div class="status-banner__icon" aria-hidden="true">◈</div>
            <div class="status-banner__body">
                <p class="status-banner__state" id="overallState">Connecting to backend…</p>
                <p class="status-banner__hint"  id="overallHint">Waiting for first response.</p>
            </div>
        </section>

    </main>

    <!-- ── Footer ── -->
    <footer class="footer">
        <span class="footer__label">ENDPOINT</span>
        <span class="footer__value" id="endpointValue">—</span>
    </footer>

    <script src="script.js"></script>
</body>
</html>
