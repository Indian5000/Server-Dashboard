<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SysPulse — Server Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-grid" aria-hidden="true"></div>
    <div class="scan-line" aria-hidden="true"></div>

    <!-- ── Top Bar ── -->
    <header class="topbar">
        <div class="topbar__left">
            <span class="topbar__logo">SYS<span class="accent">PULSE</span></span>
            <span class="topbar__divider">|</span>
            <span class="topbar__hostname" id="hostname">localhost</span>
        </div>
        <div class="topbar__right">
            <span class="status-pill" id="connectionStatus">
                <span class="status-pill__dot"></span>
                <span class="status-pill__text">Connecting…</span>
            </span>
            <span class="topbar__updated">Last updated: <span id="lastUpdated">—</span></span>
            <button class="refresh-btn" id="refreshBtn" title="Refresh now">↺</button>
        </div>
    </header>

    <!-- ── Dashboard ── -->
    <main class="dashboard">

        <!--Cpu Card-->
        <div class="hcard" id="card-cpu">
            <div class="hcard__icon-col">
                <svg class="hcard__icon" id="cpuIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="4" y="4" width="16" height="16" rx="2"/>
                    <path d="M9 9h6v6H9z"/>
                    <path d="M9 1v3M15 1v3M15 1v3M9 20v3M15 20v3M1 9h3M1 15h3M20 9h3M20 15h3"/> <!--Ai Generated-->
                </svg>
                <span class="hcard__title">CPU</span>
            </div>
            <div class="hcard__metrics">
                <div class="hcard__row">
                    <span class="hcard__label">LOAD</span>
                    <div class="hcard__bar-wrap">
                        <div class="hcard__bar" id="cpuBar"></div>
                    </div>
                    <span class="hcard__val" id="cpuValue">—</span>
                </div>
                <div class="hcard__row">
                    <span class="hcard__label">TEMP</span>
                    <div class="hcard__bar-wrap">
                        <div class="hcard__bar" id="cpuTempBar"></div>
                    </div>
                    <span class="hcard__val" id="cpuTempValue">—</span>
                </div>
            </div>
        </div>
        <!--Memory Card-->
        <div class="hcard" id="card-mem">
            <div class="hcard__icon-col">
                <svg class="hcard__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="8" width="20" height="8" rx="1"/>
                    <path d="M6 8V6M10 8V6M14 8V6M18 8V6M6 16v2M10 16v2M14 16v2M18 16v2"/> <!--Ai generated-->
                </svg>
                <span class="hcard__title">MEM</span>
            </div>
            <div class="hcard__metrics">
                <div class="hcard__row">
                    <span class="hcard__label">RAM</span>
                    <div class="hcard__bar-wrap">
                        <div class="hcard__bar" id="memoryBar"></div>
                    </div>
                    <span class="hcard__val" id="memoryValue">—</span>
                </div>
                <div class="hcard__row">
                    <span class="hcard__label">SWAP</span>
                    <div class="hcard__bar-wrap">
                        <div class="hcard__bar" id="swapBar"></div>
                    </div>
                    <span class="hcard__val" id="swapValue">—</span>
                </div>
            </div>
        </div>
        <!--Disk Card-->
        <div class="hcard" id="card-mem">
            <div class="hcard__icon-col">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-hdd" viewBox="0 0 16 16">
                    <path d="M4.5 11a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1M3 10.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0"/>
                    <path d="M16 11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V9.51c0-.418.105-.83.305-1.197l2.472-4.531A1.5 1.5 0 0 1 4.094 3h7.812a1.5 1.5 0 0 1 1.317.782l2.472 4.53c.2.368.305.78.305 1.198zM3.655 4.26 1.592 8.043Q1.79 8 2 8h12q.21 0 .408.042L12.345 4.26a.5.5 0 0 0-.439-.26H4.094a.5.5 0 0 0-.44.26zM1 10v1a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-1a1 1 0 0 0-1-1H2a1 1 0 0 0-1 1"/>
                </svg>
                <span class="hcard__title">DISK</span>
            </div>
            <div class="hcard__metrics">
                <div class="hcard__row">
                    <span class="hcard__label">USAGE</span>
                    <div class="hcard__bar-wrap">
                        <div class="hcard__bar" id="DiskUsageBar"></div>
                    </div>
                    <span class="hcard__val" id="DiskUsageValue">—</span>
                </div>
                <div class="hcard__row">
                    <span class="hcard__label">TEMP</span>
                    <div class="hcard__bar-wrap">
                        <div class="hcard__bar" id="DiskTempBar"></div>
                    </div>
                    <span class="hcard__val" id="DiskTempValue">—</span>
                </div>
            </div>
        </div>
    </main>

    <!-- ── Footer ── -->
    <footer class="footer">
        <span class="footer__label">ENDPOINT</span>
        <span class="footer__value" id="endpointValue">—</span>
    </footer>

    <script src="script.js"></script>
</body>
</html>
